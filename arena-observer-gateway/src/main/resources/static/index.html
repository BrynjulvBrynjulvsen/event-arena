<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Event Arena Observer</title>
  <style>
    :root {
      --bg: #0e1824;
      --panel: #132235;
      --line: #335070;
      --text: #d8e6f5;
      --muted: #90adc9;
      --accent: #56c2a7;
    }

    body {
      margin: 0;
      font-family: "Iosevka", "Source Code Pro", Consolas, monospace;
      background: radial-gradient(circle at 20% 20%, #16314a, var(--bg));
      color: var(--text);
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
    }

    .panel {
      background: color-mix(in oklab, var(--panel), black 10%);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
    }

    h1 {
      margin-top: 0;
      letter-spacing: 0.04em;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
    }

    input, button {
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 10px;
      background: #0d1d2e;
      color: var(--text);
      font: inherit;
    }

    button {
      background: linear-gradient(135deg, #2b8d77, var(--accent));
      color: #03150f;
      font-weight: 700;
      cursor: pointer;
    }

    .status {
      margin: 10px 0;
      color: var(--muted);
    }

    pre {
      white-space: pre-wrap;
      margin: 0;
      max-height: 70vh;
      overflow: auto;
      line-height: 1.35;
    }

    @media (max-width: 700px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <h1>Event Arena Observer</h1>
      <div class="controls">
        <input id="gateway" value="ws://localhost:8090" aria-label="Gateway URL" />
        <input id="matchId" placeholder="Match ID" aria-label="Match ID" />
        <button id="connect">Connect</button>
      </div>
      <div class="status" id="status">Disconnected</div>
      <pre id="output"></pre>
    </div>
  </div>

  <script>
    const gatewayInput = document.getElementById("gateway");
    const matchInput = document.getElementById("matchId");
    const statusEl = document.getElementById("status");
    const outputEl = document.getElementById("output");
    const connectBtn = document.getElementById("connect");
    let socket;

    function append(line) {
      outputEl.textContent = `${line}\n${outputEl.textContent}`.slice(0, 150000);
    }

    connectBtn.addEventListener("click", () => {
      const matchId = matchInput.value.trim();
      if (!matchId) {
        statusEl.textContent = "Enter a match ID first";
        return;
      }
      if (socket && socket.readyState <= 1) {
        socket.close();
      }
      const base = gatewayInput.value.replace(/\/$/, "");
      socket = new WebSocket(`${base}/ws/matches/${matchId}`);
      statusEl.textContent = "Connecting...";

      socket.onopen = () => {
        statusEl.textContent = `Connected to ${matchId}`;
      };

      socket.onmessage = (event) => {
        try {
          const parsed = JSON.parse(event.data);
          append(JSON.stringify(parsed, null, 2));
        } catch {
          append(event.data);
        }
      };

      socket.onclose = () => {
        statusEl.textContent = "Disconnected";
      };

      socket.onerror = () => {
        statusEl.textContent = "Connection error";
      };
    });
  </script>
</body>
</html>
